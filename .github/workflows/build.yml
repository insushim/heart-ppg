name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run signal-core unit tests
        run: ./gradlew :core:test --console=plain

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Read app version
        id: ver
        run: |
          VC=$(grep -m1 'versionCode =' app/build.gradle.kts | grep -o '[0-9]\+')
          VN=$(grep -m1 'versionName =' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "name=$VN" >> "$GITHUB_OUTPUT"
          echo "Building versionCode=$VC versionName=$VN"

      - name: Package APK + version.json
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/heart-debug.apk
          cat > dist/version.json <<EOF
          {
            "versionCode": ${{ steps.ver.outputs.code }},
            "versionName": "${{ steps.ver.outputs.name }}",
            "apkUrl": "https://github.com/insushim/heart-ppg/releases/download/v0.1.0/heart-debug.apk"
          }
          EOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-debug-apk
          path: dist/heart-debug.apk

      - name: Publish Release (APK + version.json atomically)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: Heart v${{ steps.ver.outputs.name }} (debug)
          body: |
            스마트폰 카메라 PPG 심박·컨디션 측정 앱 (디버그 빌드).
            ⚠️ 웰니스/참고용. 의료기기가 아니며 진단·치료·예방 목적으로 사용할 수 없습니다.

            설치: APK 다운로드 → 설정에서 '알 수 없는 출처/이 출처 허용' 후 설치.
          files: |
            dist/heart-debug.apk
            dist/version.json
          fail_on_unmatched_files: true

      # Update the advertised version ONLY after the APK is published, so the
      # update banner never points to a version whose APK isn't live yet (no race).
      - name: Sync version.json to main
        if: github.ref == 'refs/heads/main'
        run: |
          cp dist/version.json version.json
          if ! git diff --quiet version.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add version.json
            git commit -m "chore: sync version.json to published build [skip ci]"
            git push origin HEAD:main
          fi

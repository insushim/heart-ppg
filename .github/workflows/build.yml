name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run signal-core unit tests
        run: ./gradlew :core:test --console=plain

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/heart-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-debug-apk
          path: dist/heart-debug.apk

      - name: Publish Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: Heart v0.1.0 (debug)
          body: |
            스마트폰 카메라 PPG 심박·컨디션 측정 앱 (디버그 빌드).
            ⚠️ 웰니스/참고용. 의료기기가 아니며 진단·치료·예방 목적으로 사용할 수 없습니다.

            설치: APK 다운로드 → 설정에서 '알 수 없는 출처/이 출처 허용' 후 설치.
          files: dist/heart-debug.apk
          fail_on_unmatched_files: true
